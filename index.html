<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Geográfico PMUS Juliaca</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }
        
        #map { width: 100%; height: 100%; position: absolute; top: 0; bottom: 0; z-index: 1; }
        
        /* Panel de título estilo Dashboard */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 320px;
        }
        .info-panel h1 { font-size: 16px; color: #333; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-panel p { font-size: 12px; color: #666; line-height: 1.3; }
        
        /* Ajuste moderno para el control de capas */
        .leaflet-control-layers {
            border: none !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
            border-radius: 8px !important;
            font-size: 13px;
            padding: 10px !important;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1>Visor PMUS Juliaca</h1>
        <p>Plan de Movilidad Urbana Sostenible: Ejes Priorizados, Red Vial Nacional y Concesiones.</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Inicializar el mapa centrado en Juliaca
        const map = L.map('map', {
            center: [-15.4972, -70.1333],
            zoom: 13,
            zoomControl: false
        });
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 2. Capas Base
        const mapaClaro = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        const satelital = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        });

        // 3. Estilos Base Estáticos
        const estiloPerimetro = { color: "#000000", weight: 3, fillOpacity: 0.02, dashArray: "5, 5" }; // Negro
        const estiloRVN = { color: "#dc2626", weight: 2.5, opacity: 0.85 }; // Rojo
        const estiloCovirsur = { color: "#8b5cf6", weight: 4, opacity: 0.4, fillOpacity: 0.2 }; // Morado claro con transparencia

        // 4. Estilo Dinámico para Ejes Priorizados según ID
        function obtenerEstiloEjes(feature) {
            let id = feature.properties.id;
            let colorEje = "#6b7280"; // Color gris por defecto si no coincide el ID
            
            if (id == 1) colorEje = "#4ade80";      // Verde claro
            else if (id == 2) colorEje = "#fb923c"; // Naranja claro
            else if (id == 3) colorEje = "#60a5fa"; // Azul claro

            return {
                color: colorEje,
                weight: 6, // Grosor resaltado para los ejes
                opacity: 0.9
            };
        }

        // 5. Lógica de Interacción (Hover y Popups específicos)
        
        // Configuración para los Ejes Priorizados
        function opcionesEjes(feature, layer) {
            // Mostrar nombre del eje al pasar el mouse por encima (Tooltip)
            if (feature.properties && feature.properties.nomb_eje) {
                layer.bindTooltip(feature.properties.nomb_eje, { sticky: true, className: 'label-eje' });
            }
            
            // Popup clásico al hacer clic con toda la info de la tabla de atributos
            let contenido = "<div style='font-size:12px; line-height: 1.5;'>";
            for (let clave in feature.properties) {
                let valor = feature.properties[clave] !== null ? feature.properties[clave] : '-';
                contenido += `<strong>${clave}:</strong> ${valor}<br/>`;
            }
            contenido += "</div>";
            layer.bindPopup(contenido);
        }

        // Configuración para la Concesión (COVIRSUR)
        function opcionesConcesion(feature, layer) {
            // Mostrar "Concesionaria: [valor]" al pasar el mouse por encima
            if (feature.properties && feature.properties.ADM_VALIDO) {
                let textoHover = `<strong>Concesionaria:</strong> ${feature.properties.ADM_VALIDO}`;
                layer.bindTooltip(textoHover, { sticky: true, html: true });
            }

            // Popup al hacer clic
            let contenido = "<div style='font-size:12px; line-height: 1.5;'>";
            for (let clave in feature.properties) {
                let valor = feature.properties[clave] !== null ? feature.properties[clave] : '-';
                if (clave === 'ADM_VALIDO') {
                    contenido += `<strong>Concesionaria:</strong> ${valor}<br/>`;
                } else {
                    contenido += `<strong>${clave}:</strong> ${valor}<br/>`;
                }
            }
            contenido += "</div>";
            layer.bindPopup(contenido);
        }

        // Popup genérico para el resto de capas (Perímetro y RVN)
        function popupGenerico(feature, layer) {
            let contenido = "<div style='font-size:12px; line-height: 1.5;'>";
            if (feature.properties) {
                for (let clave in feature.properties) {
                    let valor = feature.properties[clave] !== null ? feature.properties[clave] : '-';
                    contenido += `<strong>${clave}:</strong> ${valor}<br/>`;
                }
            }
            contenido += "</div>";
            layer.bindPopup(contenido);
        }

        // 6. Contenedores de capas GeoJSON con sus respectivos estilos y lógicas
        const capaPerimetro = L.geoJSON(null, { style: estiloPerimetro, onEachFeature: popupGenerico });
        const capaRVN = L.geoJSON(null, { style: estiloRVN, onEachFeature: popupGenerico });
        const capaCovirsur = L.geoJSON(null, { style: estiloCovirsur, onEachFeature: opcionesConcesion });
        const capaEjes = L.geoJSON(null, { style: obtenerEstiloEjes, onEachFeature: opcionesEjes });

        // 7. Función de carga de archivos desde GitHub
        function cargarGeoJSON(url, capa) {
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error("No se encontró: " + url);
                    return response.json();
                })
                .then(data => {
                    capa.addData(data);
                    if(capa === capaPerimetro) { map.fitBounds(capa.getBounds()); }
                })
                .catch(err => console.error("Error cargando capa:", err));
        }

        // Llamadas a tus archivos GeoJSON
        cargarGeoJSON('./datos/00_Perim_Intervencion_PMUS-Juliaca.geojson', capaPerimetro);
        cargarGeoJSON('./datos/00_RVN_PMUS-Juliaca.geojson', capaRVN);
        cargarGeoJSON('./datos/00_RVN_Concesionada_COVIRSUR_Juliaca.geojson', capaCovirsur);
        cargarGeoJSON('./datos/00_Ejes_Priorizados_PMUS.geojson', capaEjes);

        // Encender todas las capas disponibles por defecto
        capaPerimetro.addTo(map);
        capaRVN.addTo(map);
        capaCovirsur.addTo(map);
        capaEjes.addTo(map);

        // 8. Panel de Control de Capas (Encendido/Apagado)
        const mapasBase = {
            "Mapa Claro": mapaClaro,
            "Vista Satelital": satelital
        };

        const capasSuperpuestas = {
            "Ejes Priorizados": capaEjes,
            "RVN Concesionada (COVIRSUR)": capaCovirsur,
            "Red Vial Nacional (RVN)": capaRVN,
            "Perímetro de Intervención": capaPerimetro
        };

        L.control.layers(mapasBase, capasSuperpuestas, { collapsed: false, position: 'topright' }).addTo(map);

    </script>
</body>
</html>
