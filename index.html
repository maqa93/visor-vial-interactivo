<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Geográfico PMUS Juliaca</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }
        
        #map { width: 100%; height: 100%; position: absolute; top: 0; bottom: 0; z-index: 1; }
        
        /* Panel de título estilo Dashboard */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 320px;
        }
        .info-panel h1 { font-size: 16px; color: #333; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-panel p { font-size: 12px; color: #666; line-height: 1.3; }
        
        /* Estilos para el Control de Capas superior derecho */
        .leaflet-control-layers {
            border: none !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
            border-radius: 8px !important;
            font-size: 13px;
            padding: 10px !important;
        }

        /* DISEÑO DE LA LEYENDA FIJA (Inferior Izquierda) */
        .legend {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 12px;
            color: #333;
            line-height: 22px;
            max-width: 240px;
        }
        .legend h4 {
            margin: 0 0 8px 0;
            font-size: 13px;
            text-transform: uppercase;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
            color: #222;
        }
        .legend i {
            width: 18px;
            height: 12px;
            float: left;
            margin-right: 8px;
            margin-top: 5px;
            opacity: 0.85;
            border-radius: 2px;
        }
        /* Ajuste específico para la línea discontinua del perímetro en leyenda */
        .legend i.linea-discontinua {
            border-top: 3px dashed #000000;
            background: transparent !important;
            height: 0;
            margin-top: 9px;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1>Visor Diagnóstico PMUS Juliaca</h1>
        <p>Plan de Movilidad Urbana Sostenible (PMUS): Ejes Priorizados, Red Vial Nacional y Concesiones.</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Inicializar el mapa centrado en Juliaca
        const map = L.map('map', {
            center: [-15.4972, -70.1333],
            zoom: 13,
            zoomControl: false
        });
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 2. Capas Base
        const mapaClaro = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        const osmEstandar = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; Colaboradores de OpenStreetMap'
        });

        const googleCalles = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            attribution: '&copy; Google Maps'
        });
        
        const satelital = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        });

        // 3. Estilos Base Estáticos (EDITA AQUÍ COLORES Y GROSORES GENERALES)
        const estiloPerimetro = { color: "#000000", weight: 3.5, fillOpacity: 0.02, dashArray: "5, 5" }; 
        const estiloRVN = { color: "#dc2626", weight: 2.5, opacity: 0.85 }; 
        const estiloCovirsur = { color: "#8b5cf6", weight: 8, opacity: 0.4, fillOpacity: 0.2 }; 

        // 4. Estilo Dinámico para Ejes Priorizados según ID (EDITA AQUÍ COLORES DE EJES)
        function obtenerEstiloEjes(feature) {
            let id = feature.properties.id;
            let colorEje = "#6b7280"; 
            
            if (id == 1) colorEje = "#4ade80";      // ID 1: Verde claro
            else if (id == 2) colorEje = "#fb923c"; // ID 2: Naranja claro
            else if (id == 3) colorEje = "#60a5fa"; // ID 3: Azul claro

            return {
                color: colorEje,
                weight: 12, // Grosor de las líneas de los ejes
                opacity: 0.9
            };
        }

        // 5. Lógica de Interacción (Hover Tooltips y Popups)
        function opcionesEjes(feature, layer) {
            if (feature.properties && feature.properties.nomb_eje) {
                layer.bindTooltip(feature.properties.nomb_eje, { sticky: true });
            }
            let contenido = "<div style='font-size:12px; line-height: 1.5;'>";
            for (let clave in feature.properties) {
                let valor = feature.properties[clave] !== null ? feature.properties[clave] : '-';
                contenido += `<strong>${clave}:</strong> ${valor}<br/>`;
            }
            contenido += "</div>";
            layer.bindPopup(contenido);
        }

        function opcionesConcesion(feature, layer) {
            if (feature.properties && feature.properties.ADM_VALIDO) {
                let textoHover = `<strong>Concesionaria:</strong> ${feature.properties.ADM_VALIDO}`;
                layer.bindTooltip(textoHover, { sticky: true, html: true });
            }
            let contenido = "<div style='font-size:12px; line-height: 1.5;'>";
            for (let clave in feature.properties) {
                let valor = feature.properties[clave] !== null ? feature.properties[clave] : '-';
                if (clave === 'ADM_VALIDO') {
                    contenido += `<strong>Concesionaria:</strong> ${valor}<br/>`;
                } else {
                    contenido += `<strong>${clave}:</strong> ${valor}<br/>`;
                }
            }
            contenido += "</div>";
            layer.bindPopup(contenido);
        }

        function popupGenerico(feature, layer) {
            let contenido = "<div style='font-size:12px; line-height: 1.5;'>";
            if (feature.properties) {
                for (let clave in feature.properties) {
                    let valor = feature.properties[clave] !== null ? feature.properties[clave] : '-';
                    contenido += `<strong>${clave}:</strong> ${valor}<br/>`;
                }
            }
            contenido += "</div>";
            layer.bindPopup(contenido);
        }

        // 6. Contenedores de capas GeoJSON
        const capaPerimetro = L.geoJSON(null, { style: estiloPerimetro, onEachFeature: popupGenerico });
        const capaRVN = L.geoJSON(null, { style: estiloRVN, onEachFeature: popupGenerico });
        const capaCovirsur = L.geoJSON(null, { style: estiloCovirsur, onEachFeature: opcionesConcesion });
        const capaEjes = L.geoJSON(null, { style: obtenerEstiloEjes, onEachFeature: opcionesEjes });

        // 7. Carga de archivos desde la carpeta /datos
        function cargarGeoJSON(url, capa) {
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error("No se encontró: " + url);
                    return response.json();
                })
                .then(data => {
                    capa.addData(data);
                    if(capa === capaPerimetro) { map.fitBounds(capa.getBounds()); }
                })
                .catch(err => console.error("Error cargando capa:", err));
        }

        cargarGeoJSON('./datos/00_Perim_Intervencion_PMUS-Juliaca.geojson', capaPerimetro);
        cargarGeoJSON('./datos/00_RVN_PMUS-Juliaca.geojson', capaRVN);
        cargarGeoJSON('./datos/00_RVN_Concesionada_COVIRSUR_Juliaca.geojson', capaCovirsur);
        cargarGeoJSON('./datos/00_Ejes_Priorizados_PMUS.geojson', capaEjes);

        capaPerimetro.addTo(map);
        capaRVN.addTo(map);
        capaCovirsur.addTo(map);
        capaEjes.addTo(map);

        // 8. Panel de Control de Capas Superior Derecho (EDITA AQUÍ LOS NOMBRES QUE SE MUESTRAN)
        const mapasBase = {
            "Mapa Claro Gris (Carto)": mapaClaro,
            "OpenStreetMap (Calles)": osmEstandar,
            "Google Maps (Calles)": googleCalles,
            "Vista Satelital (Esri)": satelitalEsri
        };

        const capasSuperpuestas = {
            "Ejes Priorizados": capaEjes,
            "Concesión (COVISUR)": capaCovirsur,
            "Red Vial Nacional (RVN)": capaRVN,
            "Perímetro de Intervención": capaPerimetro
        };

        L.control.layers(mapasBase, capasSuperpuestas, { collapsed: false, position: 'topright' }).addTo(map);

        // 9. CONSTRUCCIÓN DE LA LEYENDA FIJA (Inferior Izquierda)
        const leyenda = L.control({ position: 'bottomleft' });

        leyenda.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <h4>Leyenda</h4>
                <i class="linea-discontinua"></i> Perímetro Intervención<br>
                <i style="background: #dc2626; height: 3px; margin-top: 9px;"></i> Red Vial Nacional<br>
                <i style="background: #8b5cf6; opacity: 0.4;"></i> Concesión COVISUR<br>
                <h4 style="margin-top: 10px; border-bottom: none; font-size: 11px;">Ejes Prioritarios:</h4>
                <i style="background: #4ade80; height: 5px; margin-top: 8px;"></i> Independencia-Mariano Núñez <br>
                <i style="background: #fb923c; height: 5px; margin-top: 8px;"></i> Huancané-Jr. San Martín <br>
                <i style="background: #60a5fa; height: 5px; margin-top: 8px;"></i> Circunvalación <br>
            `;
            return div;
        };

        leyenda.addTo(map);

    </script>
</body>
</html>
