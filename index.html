<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Diagnóstico PMUS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }
        
        #map { width: 100%; height: 100%; position: absolute; top: 0; bottom: 0; z-index: 1; }
        
        /* Panel de control de Ciudad y Título Estilo Dashboard */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 320px;
        }
        .info-panel h1 { font-size: 16px; color: #333; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-panel p { font-size: 12px; color: #666; line-height: 1.3; margin-bottom: 12px; }
        
        /* Selector de ciudades */
        .selector-ciudad {
            width: 100%;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: bold;
            color: #1e3a8a;
            background-color: #eff6ff;
            border: 2px solid #3b82f6;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            margin-bottom: 10px;
        }
        .selector-ciudad:hover { background-color: #dbeafe; }
        
        /* HERRAMIENTA EN VIVO: Botón de subida de archivos */
        .btn-cargar-contenedor {
            position: relative;
            width: 100%;
            text-align: center;
        }
        .btn-cargar-label {
            display: block;
            width: 100%;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: bold;
            color: #ffffff;
            background-color: #059669;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-cargar-label:hover { background-color: #047857; }
        .file-input { display: none; } /* Ocultar el input feo por defecto de Windows */

        /* Control de Capas superior derecho */
        .leaflet-control-layers {
            border: none !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
            border-radius: 8px !important;
            font-size: 13px;
            padding: 10px !important;
        }

        /* DISEÑO DE LA LEYENDA (Inferior Izquierda) */
        .legend {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 12px;
            color: #333;
            line-height: 22px;
            max-width: 280px;
            max-height: 280px;
            overflow-y: auto;
        }
        .legend h4 {
            margin: 0 0 8px 0;
            font-size: 13px;
            text-transform: uppercase;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
            color: #222;
        }
        .legend i {
            width: 18px;
            height: 12px;
            float: left;
            margin-right: 8px;
            margin-top: 5px;
            opacity: 0.85;
            border-radius: 2px;
        }
        .legend i.linea-discontinua {
            border-top: 3px dashed #000000;
            background: transparent !important;
            height: 0;
            margin-top: 9px;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1>Visor Diagnóstico PMUS</h1>
        <p>Plan de Movilidad Urbana Sostenible (PMUS): Ejes Priorizados, Red Vial Nacional y Concesiones.<br><strong>Ciudades: Chiclayo - Huancayo - Juliaca</strong></p>
        
        <select id="ciudadSelect" class="selector-ciudad" onchange="cambiarCiudad(this.value)">
            <option value="juliaca">Juliaca</option>
            <option value="chiclayo">Chiclayo</option>
            <option value="huancayo">Huancayo</option>
        </select>

        <div class="btn-cargar-contenedor">
            <label for="fileInput" class="btn-cargar-label">📁 Cargar Ejes en Vivo (.geojson)</label>
            <input type="file" id="fileInput" class="file-input" accept=".geojson" onchange="cargarGeojsonEnVivo(event)" />
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Inicializar el mapa
        const map = L.map('map', {
            center: [-9.19, -75.01],
            zoom: 6,
            zoomControl: false
        });
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 2. Capas Base
        const mapaClaro = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap &copy; CARTO' }).addTo(map);
        const osmEstandar = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; Colaboradores de OpenStreetMap' });
        const googleCalles = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { attribution: '&copy; Google Maps' });
        const satelital = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles &copy; Esri' });

        // 3. Estilos Estáticos Base
        const estiloPerimetro = { color: "#000000", weight: 3.5, fillOpacity: 0.02, dashArray: "5, 5" }; 
        const estiloRVN = { color: "#dc2626", weight: 2.5, opacity: 0.85 }; 
        const estiloConcesion = { color: "#8b5cf6", weight: 10, opacity: 0.7, fillOpacity: 0.2 }; 

        // Diccionarios globales para el control dinámico de estilos
        let coloresEjesAsignados = {};
        let mapeoManualJuliaca = {}; 
        let ciudadActual = 'juliaca';

        // Generador dinámico de colores estéticos manteniendo tus grosores
        function obtenerColorPorNombre(nombre, id) {
            if (ciudadActual === 'juliaca') {
                if (id == 1) return "#4ade80";
                if (id == 2) return "#fb923c";
                if (id == 3) return "#60a5fa";
            }

            if (!nombre) return "#6b7280";
            if (coloresEjesAsignados[nombre]) return coloresEjesAsignados[nombre];
            
            const paleta = ["#4ade80", "#fb923c", "#60a5fa", "#f43f5e", "#06b6d4", "#a855f7", "#eab308", "#10b981", "#ec4899", "#14b8a6"];
            let indice = Object.keys(coloresEjesAsignados).length % paleta.length;
            coloresEjesAsignados[nombre] = paleta[indice];
            return coloresEjesAsignados[nombre];
        }

        function obtenerEstiloEjes(feature) {
            let nombre = feature.properties.nomb_eje;
            let id = feature.properties.id;
            return {
                color: obtenerColorPorNombre(nombre, id),
                weight: 16, 
                opacity: 0.6 
            };
        }

        // 4. Lógicas de Popups e Interacciones
        function opcionesEjes(feature, layer) {
            if (feature.properties && feature.properties.nomb_eje) {
                layer.bindTooltip(feature.properties.nomb_eje, { sticky: true });
                let id = feature.properties.id;
                if (ciudadActual === 'juliaca' && (id == 1 || id == 2 || id == 3)) {
                    mapeoManualJuliaca[id] = feature.properties.nomb_eje;
                }
            }
            let contenido = "<div style='font-size:12px; line-height: 1.5;'>";
            for (let clave in feature.properties) {
                contenido += `<strong>${clave}:</strong> ${feature.properties[clave] !== null ? feature.properties[clave] : '-'}<br/>`;
            }
            contenido += "</div>";
            layer.bindPopup(contenido);
        }

        function opcionesConcesion(feature, layer) {
            if (feature.properties && feature.properties.ADM_VALIDO) {
                layer.bindTooltip(`<strong>Concesionaria:</strong> ${feature.properties.ADM_VALIDO}`, { sticky: true, html: true });
            }
            let contenido = "<div style='font-size:12px; line-height: 1.5;'>";
            for (let clave in feature.properties) {
                let valor = feature.properties[clave] !== null ? feature.properties[clave] : '-';
                if (clave === 'ADM_VALIDO') { contenido += `<strong>Concesionaria:</strong> ${valor}<br/>`; }
                else { contenido += `<strong>${clave}:</strong> ${valor}<br/>`; }
            }
            contenido += "</div>";
            layer.bindPopup(contenido);
        }

        function popupGenerico(feature, layer) {
            let contenido = "<div style='font-size:12px; line-height: 1.5;'>";
            if (feature.properties) {
                for (let clave in feature.properties) {
                    contenido += `<strong>${clave}:</strong> ${feature.properties[clave] !== null ? feature.properties[clave] : '-'}<br/>`;
                }
            }
            contenido += "</div>";
            layer.bindPopup(contenido);
        }

        // 5. Instanciar Grupos de Capas de Leaflet
        let capaPerimetro = L.geoJSON(null, { style: estiloPerimetro, onEachFeature: popupGenerico }).addTo(map);
        let capaRVN = L.geoJSON(null, { style: estiloRVN, onEachFeature: popupGenerico }).addTo(map);
        let capaConcesion = L.geoJSON(null, { style: estiloConcesion, onEachFeature: opcionesConcesion }).addTo(map);
        let capaEjes = L.geoJSON(null, { style: obtenerEstiloEjes, onEachFeature: opcionesEjes }).addTo(map);

        // 6. Diccionario de Rutas de Archivos del Servidor
        const configuracionCiudades = {
            juliaca: {
                nombreConcesion: "Concesión COVISUR",
                perimetro: './datos/00_Perim_Intervencion_PMUS-Juliaca.geojson',
                rvn: './datos/00_RVN_PMUS-Juliaca.geojson',
                concesion: './datos/00_RVN_Concesionada_COVIRSUR_Juliaca.geojson',
                ejes: './datos/00_Ejes_Priorizados_PMUS.geojson'
            },
            chiclayo: {
                nombreConcesion: "Concesión COVISOL",
                perimetro: './datos/00_Perim_Intervencion_PMUS-Chiclayo.geojson',
                rvn: './datos/00_RVN_PMUS-Chiclayo.geojson',
                concesion: './datos/00_RVN_Concesionada_COVISOL_Chiclayo.geojson',
                ejes: './datos/00_Ejes_Priorizados_PMUS-Chiclayo.geojson'
            },
            huancayo: {
                nombreConcesion: "Concesión IIRSA CENTRO",
                perimetro: './datos/00_Perim_Intervencion_PMUS-Hyo.geojson',
                rvn: './datos/00_RVN_PMUS-Hyo.geojson',
                concesion: './datos/00_RVN_Concesionada_IIRSA-CENTRO_Hyo.geojson',
                ejes: './datos/00_Ejes_Priorizados_PMUS-Hyo.geojson'
            }
        };

        // 7. Cambiar de Ciudad dinámicamente
        function cambiarCiudad(ciudadKey) {
            ciudadActual = ciudadKey;
            capaPerimetro.clearLayers();
            capaRVN.clearLayers();
            capaConcesion.clearLayers();
            capaEjes.clearLayers();
            coloresEjesAsignados = {}; 
            document.getElementById('fileInput').value = ""; // Limpiar el input de archivos

            const dataCiudad = configuracionCiudades[ciudadKey];

            // Cargar Perímetro de la base de datos de GitHub
            fetch(dataCiudad.perimetro)
                .then(r => r.json()).then(data => {
                    capaPerimetro.addData(data);
                    map.fitBounds(capaPerimetro.getBounds());
                }).catch(e => console.error("Error Perímetro:", e));

            fetch(dataCiudad.rvn).then(r => r.json()).then(data => capaRVN.addData(data));
            fetch(dataCiudad.concesion).then(r => r.json()).then(data => capaConcesion.addData(data));
            
            fetch(dataCiudad.ejes)
                .then(r => r.json())
                .then(data => {
                    capaEjes.addData(data);
                    construirLeyenda(dataCiudad.nombreConcesion);
                }).catch(e => {
                    console.log("Esta ciudad aún no cuenta con un archivo de ejes en el servidor. Puede cargarse en vivo.");
                    construirLeyenda(dataCiudad.nombreConcesion);
                });
        }

        // ==========================================
        // TOOL EN VIVO: FUNCIÓN PARA LEER ARCHIVO LOCAL
        // ==========================================
        function cargarGeojsonEnVivo(event) {
            const archivo = event.target.files[0];
            if (!archivo) return;

            const lector = new FileReader();
            lector.onload = function(e) {
                try {
                    const datosGeoJSON = JSON.parse(e.target.result);
                    
                    // Limpiar ejes anteriores antes de inyectar el nuevo
                    capaEjes.clearLayers();
                    coloresEjesAsignados = {}; 

                    // Inyectar la capa leída en vivo al contenedor de Leaflet
                    capaEjes.addData(datosGeoJSON);
                    
                    // Hacer zoom inmediato hacia el archivo que acabamos de cargar
                    if (capaEjes.getLayers().length > 0) {
                        map.fitBounds(capaEjes.getBounds());
                    }

                    // Forzar actualización de la leyenda con los nuevos nombres del archivo local
                    const concesionTexto = configuracionCiudades[ciudadActual].nombreConcesion;
                    construirLeyenda(concesionTexto);

                } catch (error) {
                    alert("Error: El archivo seleccionado no tiene un formato GeoJSON válido.");
                    console.error(error);
                }
            };
            lector.readAsText(archivo);
        }

        // 8. Panel de Control de Capas Superior Derecho
        const mapasBase = { "Mapa Claro Gris": mapaClaro, "OpenStreetMap": osmEstandar, "Google Maps": googleCalles, "Vista Satelital": satelital };
        const capasSuperpuestas = { "Ejes Priorizados": capaEjes, "RVN Concesionada": capaConcesion, "Red Vial Nacional (RVN)": capaRVN, "Perímetro de Intervención": capaPerimetro };
        L.control.layers(mapasBase, capasSuperpuestas, { collapsed: false, position: 'topright' }).addTo(map);

        // 9. LEYENDA FIJA ADAPTATIVA
        const leyenda = L.control({ position: 'bottomleft' });
        leyenda.onAdd = function () { return L.DomUtil.create('div', 'legend'); };
        leyenda.addTo(map);

        function construirLeyenda(nombreConcesion) {
            const div = document.querySelector('.legend');
            let html = `
                <h4>Leyenda</h4>
                <i class="linea-discontinua"></i> Perímetro Intervención<br>
                <i style="background: #dc2626; height: 3px; margin-top: 9px;"></i> Red Vial Nacional<br>
                <i style="background: #8b5cf6; opacity: 0.7;"></i> ${nombreConcesion}<br>
                <h4 style="margin-top: 10px; border-bottom: none; font-size: 11px;">Ejes Prioritarios:</h4>
            `;

            if (ciudadActual === 'juliaca' && Object.keys(coloresEjesAsignados).length <= 3 && mapeoManualJuliaca[1]) {
                html += `
                    <i style="background: #4ade80; height: 5px; margin-top: 8px;"></i> ${mapeoManualJuliaca[1] || "Independencia - Mariano Núñez"}<br>
                    <i style="background: #fb923c; height: 5px; margin-top: 8px;"></i> ${mapeoManualJuliaca[2] || "Huancané - Jr. San Martín"}<br>
                    <i style="background: #60a5fa; height: 5px; margin-top: 8px;"></i> ${mapeoManualJuliaca[3] || "Circunvalación"}<br>
                `;
            } else {
                if (Object.keys(coloresEjesAsignados).length > 0) {
                    for (let nombreEje in coloresEjesAsignados) {
                        html += `<i style="background: ${coloresEjesAsignados[nombreEje]}; height: 5px; margin-top: 8px;"></i> ${nombreEje}<br>`;
                    }
                } else {
                    html += `<span style="color:#888; font-style:italic; padding-left:5px;">Sin ejes (Cargue un archivo)</span><br>`;
                }
            }
            div.innerHTML = html;
        }

        // Carga inicial automatizada
        cambiarCiudad('juliaca');

    </script>
</body>
</html>
